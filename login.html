<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Aman Ethiopia Tours & Travel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/style.css" />
    <link rel="stylesheet" href="./src/auth.css" />
  </head>
  <body class="auth-body">
    <div class="auth-page">
      <a href="/" class="auth-logo">
        <span class="logo-text">AMAN ETHIOPIA</span>
        <span class="logo-subline">TOURS & TRAVEL</span>
      </a>

      <div class="login-card">
        <h2 id="authTitle">Welcome Back</h2>
        <p id="authSubtitle">Sign in to book tours and manage your journeys.</p>

        <form id="authForm">
          <div class="form-group" id="nameGroup" style="display: none">
            <label>Full Name</label>
            <input type="text" id="authName" autocomplete="name" />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="authEmail" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="authPassword" required autocomplete="current-password" minlength="6" />
          </div>
          <button type="submit" class="btn btn-gold btn-block" id="authSubmit">Sign In</button>
          <button type="button" class="btn btn-outline btn-block" id="googleSignIn" style="display: none">Continue with Google</button>
          <p id="authError" class="error-msg"></p>
        </form>

        <p class="auth-toggle">
          <span id="authToggleText">Don't have an account?</span>
          <button type="button" id="authToggleBtn" class="btn btn-text">Sign Up</button>
        </p>
        <a href="/" class="auth-back">← Back to website</a>
      </div>
    </div>
    <script type="module" src="/src/login.js"></script>
  </body>
</html>
